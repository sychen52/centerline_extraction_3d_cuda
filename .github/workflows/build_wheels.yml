name: Build and Release Wheels

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
    branches:
      - main # Also run on main to ensure things compile
  workflow_dispatch: # Allow manual triggering from the GitHub UI

jobs:
  build_wheels:
    name: Build wheel for Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '13.0.0' # Matches PyTorch's CUDA 13.0 build
          linux-local-args: '["--toolkit"]'
          non-local-caching: false

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install PyTorch specifically compiled for CUDA 13.0
          pip install torch --index-url https://download.pytorch.org/whl/cu130

      - name: Build Wheel
        run: |
          python setup.py bdist_wheel

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.python-version }}
          path: dist/*.whl

  release:
    name: Create GitHub Release
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Only run if a tag was pushed

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
