name: Build and Release Wheels

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
    branches:
      - master # Also run on master to ensure things compile
  workflow_dispatch: # Allow manual triggering from the GitHub UI

jobs:
  build_wheels:
    name: Build wheel for Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '13.0.0' # Matches PyTorch's CUDA 13.0 build
          linux-local-args: '["--toolkit"]'
          non-local-caching: false
          log-file-suffix: '${{ matrix.python-version }}.log'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install PyTorch specifically compiled for CUDA 13.0
          pip install torch --index-url https://download.pytorch.org/whl/cu130

      - name: Build Wheel
        env:
          TORCH_CUDA_ARCH_LIST: "7.5 8.0 8.6 8.9 9.0+PTX"
        run: |
          python setup.py bdist_wheel

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.python-version }}
          path: dist/*.whl

  release:
    name: Create GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create the release and upload assets
    if: startsWith(github.ref, 'refs/tags/v') # Only run if a tag was pushed

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sdist
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write # Required for PyPI Trusted Publishers

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: sdist
          merge-multiple: true

      - name: Rename wheels to manylinux
        run: |
          # PyPI rejects "linux_x86_64" wheels. For PyTorch extensions,
          # we can safely rename them to "manylinux2014_x86_64" to bypass this.
          for wheel in dist/*linux_x86_64.whl; do
            if [ -f "$wheel" ]; then
              mv "$wheel" "${wheel/linux_x86_64/manylinux2014_x86_64}"
            fi
          done

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
        # To use an API token instead of Trusted Publishers, uncomment the following:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
